<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>MONSTRE 👹🌴</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;900&family=Space+Grotesk:wght@400;500;700&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* --- Monde Cœur / Accueil (nuit néon) --- */
  --night:#10091f; --dusk:#1a1030; --dawn:#261745;
  --ink:#f6f2ff; --muted:#9c90c6; --line:rgba(246,242,255,.09);
  --pink:#ff3d8b; --orange:#ff8e3c; --gold:#ffd166; --cyan:#35e0d0; --red:#ff5470;
  --grad:linear-gradient(90deg,var(--pink),var(--orange) 55%,var(--gold));
  /* --- Monde Prépa (cahier) --- */
  --paper:#fcfcfa; --grid:rgba(96,150,220,.16); --pink-ink:#182559;
  --bic:#2647d0; --penred:#c2182b; --pencil:#6b7280; --hi:#ffe45c;
  --pcard:#ffffff; --pline:#e4e7f0; --green:#177245;
  --r:18px; --disp:'Unbounded',system-ui,sans-serif; --body:'Space Grotesk',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--body); font-size:16px; line-height:1.5; min-height:100vh;
  background:var(--night); color:var(--ink);
  background-image:
    radial-gradient(1200px 500px at 50% -180px, rgba(255,61,139,.22), transparent 60%),
    radial-gradient(900px 400px at 85% -120px, rgba(255,142,60,.14), transparent 60%);
  background-repeat:no-repeat; background-attachment:fixed;
  transition:background-color .3s ease;
  padding-bottom:78px;
}
/* Bascule vers le monde Prépa : tout le fond devient cahier */
body.paper{
  background:var(--paper); color:var(--pink-ink);
  background-image:repeating-linear-gradient(to bottom, transparent, transparent 27px, var(--grid) 27px, var(--grid) 28px);
  background-attachment:fixed;
}
#app{max-width:560px;margin:0 auto;padding:16px 16px 30px}
.pen{font-family:'Caveat',cursive}

/* ============ APPBAR ============ */
.appbar{position:sticky;top:0;z-index:20;margin:-16px -16px 14px;padding:14px 16px 12px;
  background:rgba(16,9,31,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
body.paper .appbar{background:rgba(252,252,250,.92);border-bottom:2px solid var(--pink-ink)}
.abtop{display:flex;align-items:center;justify-content:space-between;gap:10px}
.ab-brand{font-family:var(--disp);font-weight:900;font-size:19px;letter-spacing:.5px}
.ab-brand .g{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
body.paper .ab-brand{color:var(--pink-ink)}
.ab-count{font-family:var(--disp);font-weight:900;font-size:22px;line-height:1;color:var(--gold)}
body.paper .ab-count{color:var(--penred)}
.ab-count small{display:block;font-family:var(--body);font-weight:500;font-size:10px;color:var(--muted);letter-spacing:0;margin-top:2px}
body.paper .ab-count small{color:var(--pencil)}
.abchips{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.chipbtn{background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--muted);
  font-family:var(--body);font-size:11.5px;font-weight:600;padding:5px 10px;border-radius:99px;cursor:pointer}
body.paper .chipbtn{background:#fff;border:1px solid var(--pline);color:var(--pencil)}
.chipbtn:hover{color:var(--ink)}
body.paper .chipbtn:hover{color:var(--pink-ink)}
.phasechip{padding:5px 10px;border-radius:99px;font-size:11.5px;font-weight:700;color:#fff}

/* ============ NAV MONDES (bas) ============ */
.worldnav{position:fixed;left:0;right:0;bottom:0;z-index:40;background:rgba(13,7,25,.94);
  backdrop-filter:blur(12px);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
body.paper .worldnav{background:rgba(255,255,255,.96);border-top:2px solid var(--pink-ink)}
.worldnav .inner{max-width:560px;margin:0 auto;display:flex}
.worldnav button{flex:1;background:none;border:none;cursor:pointer;padding:9px 4px 8px;
  display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted);
  font-family:var(--body);font-size:11px;font-weight:600}
body.paper .worldnav button{color:var(--pencil)}
.worldnav button .ic{font-size:20px;line-height:1}
.worldnav button.on{color:var(--gold)}
body.paper .worldnav button.on{color:var(--penred)}

/* ============ CARTES DARK (Cœur/Accueil) ============ */
.card{background:var(--dusk);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-top:14px}
.card h2{font-family:var(--disp);font-weight:700;font-size:13px;letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.card h2 .sub{font-family:var(--body);font-weight:500;font-size:11.5px;color:var(--muted);text-transform:none;letter-spacing:0;margin-left:auto}

/* fiche perso */
.charsheet{background:linear-gradient(180deg,var(--dawn),var(--dusk));border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:0 20px 50px -30px rgba(255,61,139,.45)}
.lvl-row{display:flex;align-items:center;gap:12px}
.lvl-badge{width:52px;height:52px;flex:none;border-radius:14px;background:var(--grad);display:grid;place-items:center;font-family:var(--disp);font-weight:900;font-size:20px;color:#1c0a14;box-shadow:0 6px 18px -6px rgba(255,110,80,.7)}
.lvl-info{min-width:0;flex:1}
.lvl-eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.lvl-title{font-family:var(--disp);font-weight:700;font-size:17px;line-height:1.25;overflow-wrap:anywhere}
.streak{flex:none;text-align:right}
.streak .flame{font-size:20px;line-height:1}
.streak .n{font-family:var(--disp);font-weight:700;font-size:15px}
.streak .lbl{font-size:10.5px;color:var(--muted)}
.xpbar-wrap{margin-top:14px}
.xpbar{height:12px;border-radius:99px;background:rgba(0,0,0,.35);border:1px solid var(--line);overflow:hidden}
.xpbar>i{display:block;height:100%;background:var(--grad);border-radius:99px;transition:width .6s cubic-bezier(.2,.8,.2,1)}
.xpmeta{display:flex;justify-content:space-between;margin-top:6px;font-size:12px;color:var(--muted)}
.xpmeta b{color:var(--ink)}
.statsrow{display:flex;gap:8px;margin-top:14px}
.stat{flex:1;background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:12px;padding:8px 6px;text-align:center}
.stat .v{font-family:var(--disp);font-weight:700;font-size:15px}
.stat .k{font-size:10.5px;color:var(--muted);margin-top:1px}

.mission{border-color:rgba(255,209,102,.35);background:linear-gradient(180deg,rgba(255,209,102,.08),var(--dusk))}
.mission p{margin-top:8px;font-size:15.5px;font-weight:500}
.mission .row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}

.boss .hp{margin-top:10px}
.hpbar{height:14px;border-radius:99px;background:rgba(0,0,0,.35);border:1px solid var(--line);overflow:hidden}
.hpbar>i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,#ff5470,#ff3d8b);transition:width .6s ease}
.hpmeta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:6px}
.fearchart{display:flex;align-items:flex-end;gap:4px;height:70px;margin-top:14px}
.fearchart .bar{flex:1;border-radius:4px 4px 2px 2px;min-height:6px;background:var(--cyan);opacity:.9}
.trend{margin-top:10px;font-size:13.5px}
.trend b{color:var(--cyan)}
.trend.up b{color:var(--red)}

.quest{background:var(--dawn);border:1px solid var(--line);border-radius:14px;padding:13px;margin-top:10px;position:relative}
.quest.closed{opacity:.55}
.quest.couple{border-color:rgba(255,61,139,.6);box-shadow:0 0 0 1px rgba(255,61,139,.25),0 10px 30px -18px rgba(255,61,139,.8)}
.qtop{display:flex;align-items:center;gap:10px}
.qavatar{width:38px;height:38px;flex:none;border-radius:11px;background:rgba(0,0,0,.3);border:1px solid var(--line);display:grid;place-items:center;font-size:19px}
.qname{font-weight:700;font-size:15.5px;min-width:0;overflow-wrap:anywhere}
.qchip{margin-left:auto;flex:none;font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:99px;border:1px solid var(--line);color:var(--muted)}
.qchip.won{color:var(--gold);border-color:rgba(255,209,102,.5)}
.qchip.couple{color:var(--pink);border-color:rgba(255,61,139,.6)}
.qmenu-btn{flex:none;background:none;border:none;color:var(--muted);font-size:18px;padding:2px 6px;cursor:pointer;border-radius:8px}
.qsteps{display:flex;align-items:center;margin-top:12px}
.qstep{flex:none;width:30px;height:30px;border-radius:99px;display:grid;place-items:center;font-size:14px;background:rgba(0,0,0,.3);border:1px solid var(--line);filter:grayscale(1);opacity:.5}
.qstep.done{filter:none;opacity:1;border-color:rgba(255,209,102,.55);background:rgba(255,209,102,.12)}
.qlink{flex:1;height:2px;background:var(--line)}
.qlink.done{background:linear-gradient(90deg,var(--orange),var(--gold))}
.qactions{margin-top:12px;display:flex;gap:8px}
.qmenu{position:absolute;right:10px;top:44px;background:#0d0719;border:1px solid var(--line);border-radius:12px;padding:6px;z-index:30;box-shadow:0 16px 40px rgba(0,0,0,.6);min-width:190px}
.qmenu button{display:block;width:100%;text-align:left;background:none;border:none;color:var(--ink);font-family:var(--body);font-size:14px;padding:9px 10px;border-radius:8px;cursor:pointer}
.qmenu button:hover{background:rgba(255,255,255,.07)}
.qmenu button.danger{color:var(--red)}
.addform{margin-top:12px;border:1px dashed rgba(246,242,255,.18);border-radius:14px;padding:13px}
.addform .hint{font-size:12.5px;color:var(--muted);margin-bottom:9px}
.addform input{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--line);border-radius:11px;color:var(--ink);font-family:var(--body);font-size:15px;padding:10px 12px;outline:none}
.addform input:focus{border-color:rgba(255,61,139,.55)}
.emojirow{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
.emojirow button{width:36px;height:36px;border-radius:10px;border:1px solid var(--line);background:rgba(0,0,0,.25);font-size:17px;cursor:pointer}
.emojirow button.sel{border-color:var(--gold);background:rgba(255,209,102,.14)}
.logline{display:flex;gap:10px;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px}
.logline:last-child{border-bottom:none}
.logline .lxp{flex:none;font-family:var(--disp);font-weight:700;font-size:12.5px;color:var(--cyan);width:56px}
.logline .ltxt{min-width:0;overflow-wrap:anywhere}
.logline .ldate{margin-left:auto;flex:none;font-size:11.5px;color:var(--muted)}
.rules{margin-top:14px;font-size:13px;color:var(--muted)}
.rules b{color:var(--ink)}
.rules ol{margin:8px 0 0 18px;display:grid;gap:5px}
.empty{margin-top:10px;font-size:14px;color:var(--muted)}

/* portails accueil */
.portals{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.portal{border-radius:var(--r);padding:16px;cursor:pointer;border:1px solid var(--line);text-align:left;font-family:var(--body);color:var(--ink);position:relative;overflow:hidden}
.portal.coeur{background:linear-gradient(160deg,rgba(255,61,139,.22),rgba(255,142,60,.12))}
.portal.prepa{background:linear-gradient(160deg,rgba(53,224,208,.16),rgba(38,71,208,.14))}
.portal .pemoji{font-size:26px}
.portal .ptitle{font-family:var(--disp);font-weight:700;font-size:16px;margin-top:8px}
.portal .psub{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.35}
.snap{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.snap .pill{font-size:11px;font-weight:600;padding:3px 8px;border-radius:99px;background:rgba(0,0,0,.25);border:1px solid var(--line);color:var(--ink)}

/* ============ BOUTONS ============ */
.btn{appearance:none;border:none;cursor:pointer;font-family:var(--body);font-weight:700;font-size:14px;padding:10px 14px;border-radius:12px;color:#1c0a14;background:var(--grad);box-shadow:0 8px 20px -10px rgba(255,110,80,.8);transition:transform .08s ease}
.btn:active{transform:scale(.97)}
.btn.ghost{background:rgba(255,255,255,.06);color:var(--ink);border:1px solid var(--line);box-shadow:none}
.btn.small{padding:8px 12px;font-size:13px}
.btn.block{width:100%}

/* ============ MODALE / OVERLAY (dark) ============ */
.overlay{position:fixed;inset:0;background:rgba(8,4,18,.75);backdrop-filter:blur(4px);z-index:60;display:grid;place-items:end center;padding:14px}
@media(min-width:560px){.overlay{place-items:center}}
.sheet{width:100%;max-width:500px;background:#170e2c;border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:0 30px 80px rgba(0,0,0,.7);max-height:88vh;overflow:auto}
.sheet h3{font-family:var(--disp);font-weight:700;font-size:15px;margin-bottom:4px}
.sheet h4{font-family:var(--disp);font-weight:700;font-size:11.5px;letter-spacing:.07em;text-transform:uppercase;margin-top:16px;border-top:1px solid var(--line);padding-top:14px;color:var(--muted)}
.sheet .for{font-size:13px;color:var(--muted);margin-bottom:12px}
.actlist{display:grid;gap:8px}
.actbtn{display:flex;align-items:center;gap:11px;width:100%;text-align:left;cursor:pointer;background:rgba(0,0,0,.25);border:1px solid var(--line);border-radius:13px;padding:11px 12px;color:var(--ink);font-family:var(--body)}
.actbtn.sel{border-color:var(--gold);background:rgba(255,209,102,.1)}
.actbtn .aemoji{font-size:19px;flex:none}
.actbtn .alabel{font-weight:600;font-size:14.5px}
.actbtn .atag{font-size:11px;color:var(--muted)}
.actbtn .axp{margin-left:auto;flex:none;font-family:var(--disp);font-weight:700;font-size:13px;color:var(--cyan)}
.actbtn .axp.boss{color:var(--gold)} .actbtn .axp.leg{color:var(--pink)}
.fearbox{margin-top:14px;border-top:1px solid var(--line);padding-top:13px}
.fearbox label{font-size:13px;color:var(--muted)}
.fearval{font-family:var(--disp);font-weight:700;font-size:16px;margin-left:8px}
input[type=range]{width:100%;margin-top:10px;accent-color:var(--pink)}
.sheetrow{display:flex;gap:8px;margin-top:16px}
.sheetrow .btn{flex:1}
.set-field{margin-top:10px}
.set-field label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px}
.set-field input{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--line);border-radius:11px;color:var(--ink);font-family:var(--body);font-size:14px;padding:9px 11px;outline:none}
.set-status{margin-top:12px;font-size:13px;color:var(--muted);display:grid;gap:5px}
.set-status b{color:var(--ink)}
.set-note{margin-top:10px;font-size:11.5px;color:var(--muted);line-height:1.45}

/* ============ COMPOSANTS PRÉPA (papier) ============ */
.p-margin{position:fixed;top:0;bottom:0;left:6px;width:1px;background:var(--penred);opacity:.4;z-index:5}
.p-tabstrip{display:flex;gap:6px;overflow-x:auto;margin:2px 0 14px;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.p-tab{flex:none;background:#fff;border:1.5px solid var(--pline);color:var(--pencil);font-family:var(--body);font-weight:700;font-size:12.5px;padding:8px 12px;border-radius:11px;cursor:pointer;white-space:nowrap}
.p-tab.on{border-color:var(--pink-ink);color:var(--penred);background:var(--paper)}
.p-h{font-weight:800;font-size:18px;color:var(--pink-ink)}
.p-sub{font-size:13px;color:var(--pencil)}
.p-card{background:var(--pcard);border:1px solid var(--pline);border-radius:14px;padding:16px;margin-top:12px}
.p-card.ink{border:1.5px solid var(--pink-ink)}
.p-card.red{border:1.5px solid var(--penred)}
.p-card.hi{background:var(--hi);border:1px solid var(--pline)}
.p-card-title{font-weight:800;color:var(--pink-ink)}
.p-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--pline);font-size:14px}
.p-row:last-child{border-bottom:none}
.p-flex{flex:1;line-height:1.3}
.p-red{color:var(--penred)} .p-bic{color:var(--bic)} .p-green{color:var(--green)} .p-pencil{color:var(--pencil)}
.p-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--pencil);display:grid;place-items:center;flex:none;background:transparent;color:#fff;font-weight:900;font-size:13px}
.p-check.on{background:var(--green);border-color:var(--green)}
.p-item{display:flex;align-items:flex-start;gap:11px;width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:9px 0;border-bottom:1px solid var(--pline);font-family:var(--body);color:var(--pink-ink)}
.p-item .lab{font-size:14px;line-height:1.35}
.p-item.done .lab{text-decoration:line-through;opacity:.5}
.p-progress{height:6px;background:var(--pline);border-radius:0 0 14px 14px;overflow:hidden;margin:12px -16px -16px}
.p-progress>i{display:block;height:100%;background:var(--bic);transition:width .4s ease}
.p-input{width:100%;background:#fff;border:2px solid var(--bic);border-radius:11px;color:var(--pink-ink);font-family:var(--body);font-size:17px;font-weight:600;padding:11px 13px;outline:none}
.p-time{width:100%;background:var(--paper);border:1.5px solid var(--pline);border-radius:9px;color:var(--pink-ink);font-family:var(--body);font-weight:700;padding:8px;font-size:15px}
.p-time.ok{border-color:var(--green)}
.p-choice{width:100%;text-align:left;background:#fff;border:1.5px solid var(--pline);border-radius:11px;font-family:var(--body);font-weight:600;font-size:15px;color:var(--pink-ink);padding:12px 14px;cursor:pointer;margin-top:8px}
.p-choice:hover{border-color:var(--bic)}
.p-btn{width:100%;border:none;border-radius:12px;font-family:var(--body);font-weight:800;font-size:15px;padding:12px;cursor:pointer;color:#fff}
.p-btn.red{background:var(--penred)} .p-btn.ink{background:var(--pink-ink)} .p-btn.bic{background:var(--bic)} .p-btn.green{background:var(--green)}
.p-grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.p-domcard{background:#fff;border:1px solid var(--pline);border-radius:12px;padding:12px;text-align:left;cursor:pointer;font-family:var(--body);color:var(--pink-ink)}
.p-domcard .dn{font-weight:700;font-size:14px}
.p-domcard .dl{font-size:12px;color:var(--pencil);margin-top:2px}
.p-fb{border-radius:12px;padding:14px;margin-top:12px}
.p-fb.ok{background:#eef7f0;border:1.5px solid var(--green)}
.p-fb.no{background:#fdf0f1;border:1.5px solid var(--penred)}
.p-flash{width:100%;min-height:150px;background:#fff;border:1.5px solid var(--pink-ink);border-radius:14px;padding:22px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;font-family:var(--body);color:var(--pink-ink)}

/* ============ DASHBOARD (Accueil) ============ */
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px}
.kpi{background:var(--dusk);border:1px solid var(--line);border-radius:14px;padding:13px 14px}
.kpi .kv{font-family:var(--disp);font-weight:900;font-size:22px;line-height:1.1}
.kpi .kl{font-size:10.5px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.07em;font-weight:600}
.kpi .ks{font-size:11.5px;margin-top:6px;color:var(--muted)}
.kpi.gold .kv{color:var(--gold)}.kpi.pink .kv{color:var(--pink)}.kpi.cyan .kv{color:var(--cyan)}.kpi.orange .kv{color:var(--orange)}
.skilltree{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:14px 8px;margin-top:14px}
.skill{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}
.skill.locked{opacity:.4;filter:grayscale(.6)}
.ring{width:60px;height:60px;border-radius:50%;display:grid;place-items:center;position:relative}
.ring::before{content:"";position:absolute;inset:5px;border-radius:50%;background:var(--dusk)}
.ring .rin{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;line-height:1}
.ring .rlvl{font-family:var(--disp);font-weight:900;font-size:15px}
.ring .rpct{font-size:9px;color:var(--muted);margin-top:3px}
.sname{font-size:10.5px;font-weight:600;color:var(--muted);line-height:1.2}

<script>
"use strict";

/* =======================================================================
   CONFIG PRÉPA (porté de monstre-pcsi)
   ======================================================================= */
const pad = n => String(n).padStart(2,"0");
const dkOf = d => d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
const todayKey = () => dkOf(new Date());
const fromDk = dk => { const [y,m,d]=dk.split("-").map(Number); return new Date(y,m-1,d); };
const addDays = (dk,n) => { const d=fromDk(dk); d.setDate(d.getDate()+n); return dkOf(d); };
const daysTo = (dk,t) => Math.round((fromDk(t)-fromDk(dk))/86400000);
const WD=["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
const MO=["janv.","févr.","mars","avril","mai","juin","juil.","août","sept.","oct.","nov.","déc."];
const frDate = dk => { const d=fromDk(dk); return WD[d.getDay()]+" "+d.getDate()+" "+MO[d.getMonth()]; };

const RENTREE="2026-09-01";
const phaseOf = dk => dk<"2026-07-13"?"reset":dk<"2026-08-12"?"croisiere":dk<"2026-09-01"?"intense":"rentree";
const PHASE_META={
  reset:{label:"RESET",desc:"Sommeil + mise en route",color:"#2647d0"},
  croisiere:{label:"CROISIÈRE",desc:"Matinées studieuses, après-midis libres",color:"#177245"},
  intense:{label:"INTENSE",desc:"Journées type prépa",color:"#c2182b"},
  rentree:{label:"RENTRÉE",desc:"C'est parti.",color:"#182559"},
};
const RAMP=[
  {to:"2026-07-08",wake:"09:30",bed:"01:30"},{to:"2026-07-10",wake:"09:00",bed:"01:00"},
  {to:"2026-07-12",wake:"08:30",bed:"00:45"},{to:"2026-08-11",wake:"08:30",bed:"00:15"},
  {to:"2026-08-15",wake:"08:00",bed:"23:45"},{to:"2026-08-19",wake:"07:30",bed:"23:15"},
  {to:"2026-08-23",wake:"07:15",bed:"23:00"},{to:"2026-08-27",wake:"07:00",bed:"22:45"},
  {to:"2026-12-31",wake:"06:45",bed:"22:30"},
];
const rampOf = dk => RAMP.find(r=>dk<=r.to)||RAMP[RAMP.length-1];
const DEADLINES=[
  {dk:"2026-07-20",label:"Énigme info n°1 → mail au prof",icon:"💻"},
  {dk:"2026-07-31",label:"DM Maths n°1 → Cahier de Prépa",icon:"📐"},
  {dk:"2026-08-09",label:"Chimie Partie I (ex. 1–4) → Cahier de Prépa",icon:"⚗️"},
  {dk:"2026-08-20",label:"Énigme info n°2 → mail au prof",icon:"💻"},
  {dk:"2026-08-23",label:"Chimie Partie II (ex. 5–6) → Cahier de Prépa",icon:"⚗️"},
  {dk:"2026-08-30",label:"DM Maths n°2 → Cahier de Prépa",icon:"📐"},
  {dk:"2026-09-01",label:"RENTRÉE — copie SI + évals (maths, physique, chimie, anglais)",icon:"🎒"},
];
const TODOS=[
  {id:"cdp",label:"S'inscrire sur cahier-de-prepa.fr/pcsi-stanislas + récupérer le DM maths de juillet"},
  {id:"platon",label:"Commander Platon, Ion + République X (GF Prépas scientifiques 2026)"},
  {id:"zola",label:"Commander Zola, L'Œuvre (GF) + Woolf, Un lieu à soi (Folio, trad. Darrieussecq)"},
  {id:"anglais",label:"Commander « Tout l'anglais aux concours » (3e éd., 2024)"},
  {id:"blouse",label:"Acheter blouse coton manches longues + lunettes de sécurité (TP semaine 1)"},
  {id:"dunod",label:"(Option) Cahier d'entraînement physique-chimie 1re année, Dunod"},
  {id:"esp",label:"Vérifier s'il existe un doc de travail d'été en espagnol"},
  {id:"opal",label:"Configurer Temps d'écran / Opal : blocage réseaux 9h–12h"},
  {id:"chiang",label:"Lire « Exhalation » (Ted Chiang) + écouter « The Merchant and the Alchemist's Gate »"},
];
const BOOKS=[
  {to:"2026-07-09",name:"Ion (Platon)"},{to:"2026-08-03",name:"L'Œuvre (Zola) — ≈20 pages"},
  {to:"2026-08-10",name:"Un lieu à soi (Woolf)"},{to:"2026-08-16",name:"La République, livre X"},
  {to:"2026-12-31",name:"Fiches + citations (les 4 œuvres)"},
];
const bookOf = dk => (BOOKS.find(b=>dk<=b.to)||BOOKS[BOOKS.length-1]).name;
const SCI_BY_DAY={1:"Physique",2:"Chimie (devoir en cours)",3:"SI / Info",4:"Physique",5:"Chimie (devoir en cours)",6:"Refais tes ratés de la semaine"};

function buildChecklist(dk){
  const ph=phaseOf(dk),r=rampOf(dk),wd=fromDk(dk).getDay();
  if(ph==="rentree") return [{id:"go",label:"Sois un monstre. Bonne rentrée. 🎒"}];
  if(wd===0){
    return ph==="intense"?[
      {id:"wake",label:"Réveil ≤ "+r.wake+" (+30 min max)"},
      {id:"flash",label:"Révision légère : 15 flashcards + relecture fiches"},
      {id:"out",label:"Repos actif — sortie, mer, sport"},
      {id:"prep",label:"Préparer la semaine (planning + affaires)"},
      {id:"bed",label:"Coucher "+r.bed},
    ]:[
      {id:"wake",label:"Réveil libre mais ≤ "+r.wake+" + 1h"},
      {id:"read",label:"Lecture plaisir 30 min"},
      {id:"vo",label:"1 film / épisode en VO → entrée logbook"},
      {id:"off",label:"Zéro maths. Vraie coupure."},
      {id:"bed",label:"Coucher "+r.bed},
    ];
  }
  if(ph==="reset") return [
    {id:"wake",label:"Réveil "+r.wake+" + lumière dehors 10 min"},
    {id:"drill",label:"Drill automatismes : 1 série (onglet Drill)"},
    {id:"math",label:"Maths : cahier de calcul / DM 30–45 min"},
    {id:"read",label:"Lecture : "+bookOf(dk)+" — 30 à 45 min"},
    {id:"eng",label:"Anglais : 1 entrée logbook ou 10 phrases de thème"},
    {id:"caf",label:"Caféine stop 14h"},
    {id:"bed",label:"Coucher "+r.bed+" — écrans off 30 min avant"},
  ];
  if(ph==="croisiere") return [
    {id:"wake",label:"Réveil "+r.wake+" + lumière"},
    {id:"drill",label:"Drill automatismes : 1 série"},
    {id:"math",label:"Maths : cahier de calcul / DM 45 min"},
    {id:"sci",label:SCI_BY_DAY[wd]+" : 45 min"},
    {id:"eng",label:"Anglais : logbook / thème / visio WSE 30 min"},
    {id:"read",label:"Lecture : "+bookOf(dk)+" — 45 min"},
    {id:"flash",label:"Par cœur : 10 flashcards"},
    {id:"bed",label:"Coucher "+r.bed},
  ];
  return [
    {id:"wake",label:"Réveil "+r.wake},
    {id:"b1",label:"Bloc 1 (9h–12h) : Maths — DM2, cahier de calcul, par cœur"},
    {id:"drill",label:"Drill automatismes : 2 séries"},
    {id:"b2",label:"Bloc 2 (14h30–16h30) : Physique / Chimie / SI-Info"},
    {id:"lang",label:"17h : anglais (thème + logbook) + espagnol léger"},
    {id:"read",label:"Philo : "+bookOf(dk)},
    {id:"bed",label:"Coucher "+r.bed},
  ];
}

/* ---- maths utils ---- */
const ri=(a,b)=>a+Math.floor(Math.random()*(b-a+1));
const rnz=(a,b)=>{let x=0;while(x===0)x=ri(a,b);return x;};
const pick=a=>a[Math.floor(Math.random()*a.length)];
const gcd=(a,b)=>b?gcd(b,a%b):Math.abs(a);
const fracS=(n,d)=>{if(d<0){n=-n;d=-d;}const g=gcd(Math.abs(n),d)||1;n/=g;d/=g;return d===1?String(n):n+"/"+d;};
const SUP={"-":"⁻",0:"⁰",1:"¹",2:"²",3:"³",4:"⁴",5:"⁵",6:"⁶",7:"⁷",8:"⁸",9:"⁹"};
const sup=n=>String(n).split("").map(c=>SUP[c]||c).join("");
const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;};
const term=(c,s)=>c===0?"":((Math.abs(c)===1&&s?"":Math.abs(c))+s);
function poly(terms){let out="";terms.forEach(([c,s])=>{if(c===0)return;if(!out)out=(c<0?"−":"")+term(c,s);else out+=(c<0?" − ":" + ")+term(c,s);if(Math.abs(c)===1&&!s)out+="1";});return out||"0";}
const mcq=(correct,distractors)=>{const set=[correct];distractors.forEach(d=>{if(!set.includes(d)&&set.length<4)set.push(d);});let k=2;while(set.length<4){const alt=correct+" · "+k;if(!set.includes(alt))set.push(alt);k++;}return{choices:shuffle(set),sol:correct};};

const DOMAINS=[
  {id:"frac",name:"Fractions"},{id:"pow",name:"Puissances"},{id:"lit",name:"Calcul littéral"},
  {id:"rac",name:"Racines"},{id:"sd",name:"Second degré"},{id:"expln",name:"Exp & ln"},
  {id:"trig",name:"Trigo"},{id:"der",name:"Dérivées"},{id:"prim",name:"Primitives"},
  {id:"int",name:"Intégrales"},{id:"suit",name:"Suites"},{id:"cplx",name:"Complexes"},{id:"sys",name:"Systèmes"},
];
const GEN={
  frac(l){if(l===1){const d=ri(3,12),a=ri(1,11),b=ri(1,11),s=pick([1,-1]);const n=a+s*b;return{q:a+"/"+d+" "+(s>0?"+":"−")+" "+b+"/"+d+" = ?",mode:"num",sol:n/d,disp:fracS(n,d)};}
    if(l===2){const a=ri(1,9),b=ri(2,9),c=ri(1,9),d=ri(2,9),s=pick([1,-1]);const n=a*d+s*c*b;return{q:a+"/"+b+" "+(s>0?"+":"−")+" "+c+"/"+d+" = ?",mode:"num",sol:n/(b*d),disp:fracS(n,b*d)};}
    const a=ri(1,9),b=ri(2,9),c=ri(1,9),d=ri(2,9),div=pick([0,1]);
    if(div)return{q:"("+a+"/"+b+") ÷ ("+c+"/"+d+") = ?",mode:"num",sol:(a*d)/(b*c),disp:fracS(a*d,b*c)};
    return{q:"("+a+"/"+b+") × ("+c+"/"+d+") = ?",mode:"num",sol:(a*c)/(b*d),disp:fracS(a*c,b*d)};},
  pow(l){const a=pick([2,3,5,10]);
    if(l===1){const m=ri(2,9),n=ri(2,9),s=pick([1,-1]);const e=s>0?m+n:m-n;return{q:a+sup(m)+" "+(s>0?"×":"÷")+" "+a+sup(n)+" = "+a+sup("n")+".  n = ?",mode:"num",sol:e,disp:String(e)};}
    if(l===2){const m=ri(2,5),n=ri(2,4),p=ri(1,9);const e=m*n-p;return{q:"("+a+sup(m)+")"+sup(n)+" ÷ "+a+sup(p)+" = "+a+sup("n")+".  n = ?",mode:"num",sol:e,disp:String(e)};}
    const m=pick([3,5,7,9]);return{q:"√("+a+sup(m)+") = "+a+sup("n")+".  n = ? (fraction)",mode:"num",sol:m/2,disp:m+"/2"};},
  lit(l){if(l===1){const a=rnz(-7,7),b=rnz(-7,7);const ok=poly([[1,"x²"],[a+b,"x"],[a*b,""]]);
      const m=mcq(ok,[poly([[1,"x²"],[a-b,"x"],[a*b,""]]),poly([[1,"x²"],[a+b,"x"],[-a*b,""]]),poly([[1,"x²"],[a*b,"x"],[a+b,""]])]);
      return{q:"Développer : (x "+(a<0?"−":"+")+" "+Math.abs(a)+")(x "+(b<0?"−":"+")+" "+Math.abs(b)+")",mode:"mcq",...m,disp:ok};}
    if(l===2){const a=ri(1,3),b=rnz(-6,6);const ok=poly([[a*a,"x²"],[2*a*b,"x"],[b*b,""]]);
      const m=mcq(ok,[poly([[a*a,"x²"],[b*b,""]]),poly([[a*a,"x²"],[a*b,"x"],[b*b,""]]),poly([[a*a,"x²"],[2*a*b,"x"],[-b*b,""]])]);
      return{q:"Développer : ("+(term(a,"x")||"x")+" "+(b<0?"−":"+")+" "+Math.abs(b)+")²",mode:"mcq",...m,disp:ok};}
    let p=rnz(-6,6),q2=rnz(-6,6);if(p===q2)q2=p+1||1;const f=r=>"(x "+(r>0?"−":"+")+" "+Math.abs(r)+")";const ok=f(p)+f(q2);
    const m=mcq(ok,[f(-p)+f(-q2),f(-p)+f(q2),f(p)+f(-q2)]);
    return{q:"Factoriser : "+poly([[1,"x²"],[-(p+q2),"x"],[p*q2,""]]),mode:"mcq",...m,disp:ok};},
  rac(l){if(l===1){const k=ri(2,6),m=pick([2,3,5,6,7]);const ok=k+"√"+m;const mq=mcq(ok,[m+"√"+k,(k*m)+"√"+m,k+"√"+(k*m)]);
      return{q:"Simplifier : √"+(k*k*m),mode:"mcq",...mq,disp:ok};}
    if(l===2){const k=ri(2,9);const divs=[];for(let a=2;a<k*k;a++)if((k*k)%a===0)divs.push(a);const a=pick(divs),b=(k*k)/a;
      return{q:"√"+a+" × √"+b+" = ?",mode:"num",sol:k,disp:String(k)};}
    const a=ri(2,9),b=pick([2,3,5,7]);const ok=a+"√"+b+"⁄"+b;const m=mcq(ok,[a+"√"+b,"√"+b+"⁄"+a,a+"⁄"+b+"√"+b]);
    return{q:"Rationaliser : "+a+"/√"+b,mode:"mcq",...m,disp:ok};},
  sd(l){if(l===1){const a=rnz(-3,3),b=rnz(-9,9),c=rnz(-9,9);return{q:"Δ de "+poly([[a,"x²"],[b,"x"],[c,""]])+" ?",mode:"num",sol:b*b-4*a*c,disp:String(b*b-4*a*c)};}
    if(l===2){let p=rnz(-7,7),q2=rnz(-7,7);if(p===q2)q2=-p||2;return{q:"Racines de "+poly([[1,"x²"],[-(p+q2),"x"],[p*q2,""]])+" = 0 ?  (format a;b)",mode:"pair",sol:[p,q2],ordered:false,disp:p+" ; "+q2};}
    let p=rnz(-5,5),q2=rnz(-5,5);if(p===q2)q2=p+2;const lo=Math.min(p,q2),hi=Math.max(p,q2);
    const ok="Négatif sur ]"+lo+" ; "+hi+"[, positif ailleurs";const m=mcq(ok,["Positif sur ]"+lo+" ; "+hi+"[, négatif ailleurs","Toujours positif","Négatif sur ]−∞ ; "+lo+"["]);
    return{q:"Signe de "+poly([[1,"x²"],[-(p+q2),"x"],[p*q2,""]])+" (a=1, racines "+lo+" et "+hi+") ?",mode:"mcq",...m,disp:ok};},
  expln(l){if(l===1){const mode=pick([0,1,2]);
      if(mode===0){const k=rnz(-9,9);return{q:"ln(e"+sup(k)+") = ?",mode:"num",sol:k,disp:String(k)};}
      if(mode===1){const k=ri(2,9);return{q:"e^(ln "+k+") = ?",mode:"num",sol:k,disp:String(k)};}
      const a=ri(1,6),b=ri(1,6);return{q:"e"+sup(a)+" × e"+sup(b)+" = e"+sup("n")+".  n = ?",mode:"num",sol:a+b,disp:String(a+b)};}
    if(l===2){const a=ri(2,5),b=rnz(-9,9);return{q:"Résoudre : e^("+a+"x) = e"+sup(b)+".  x = ? (fraction ok)",mode:"num",sol:b/a,disp:fracS(b,a)};}
    const a=ri(2,6),b=ri(2,6),c=ri(2,6);const ok="ln("+(a*b)+"/"+c+")";const m=mcq(ok,["ln("+(a+b-c)+")","ln("+(a*b*c)+")","ln("+(a+b)+"/"+c+")"]);
    return{q:"Simplifier : ln "+a+" + ln "+b+" − ln "+c,mode:"mcq",...m,disp:ok};},
  trig(l){const T=[["0","1","0"],["π/6","√3/2","1/2"],["π/4","√2/2","√2/2"],["π/3","1/2","√3/2"],["π/2","0","1"]];const VALS=["0","1/2","√2/2","√3/2","1"];
    if(l===1){const row=pick(T),f=pick(["cos","sin"]);const ok=f==="cos"?row[1]:row[2];const m=mcq(ok,shuffle(VALS.filter(v=>v!==ok)).slice(0,3));
      return{q:f+"("+row[0]+") = ?",mode:"mcq",...m,disp:ok};}
    if(l===2){const EQ=[["cos x = 1/2","{ π/3 ; 5π/3 }"],["cos x = √2/2","{ π/4 ; 7π/4 }"],["cos x = −1/2","{ 2π/3 ; 4π/3 }"],["sin x = 1/2","{ π/6 ; 5π/6 }"],["sin x = √3/2","{ π/3 ; 2π/3 }"],["cos x = 0","{ π/2 ; 3π/2 }"]];
      const [eq,ok]=pick(EQ);const others=EQ.map(e=>e[1]).filter(s=>s!==ok);const m=mcq(ok,shuffle(others).slice(0,3));
      return{q:"Résoudre sur [0 ; 2π] : "+eq,mode:"mcq",...m,disp:ok};}
    const ID=[["cos(π − x)","−cos x"],["cos(π + x)","−cos x"],["sin(π − x)","sin x"],["sin(π + x)","−sin x"],["cos(−x)","cos x"],["sin(−x)","−sin x"],["cos(π/2 − x)","sin x"],["sin(π/2 − x)","cos x"]];

  let s=0,cur=tk;if(!done(cur))cur=addDays(cur,-1);while(cur>="2026-07-06"&&done(cur)){s++;cur=addDays(cur,-1);}return s;}

/* ---- Drill ---- */
function drillLvl(id){return(S.skills.d[id]&&S.skills.d[id].lvl)||1;}
function startDrill(domSel){const queue=[];for(let i=0;i<10;i++){const id=domSel==="mix"?pick(DOMAINS).id:domSel;queue.push({...GEN[id](drillLvl(id)),dom:id,lvl:drillLvl(id)});}
  ui.sess={domSel,queue,idx:0,results:[],fb:null,t0:Date.now(),xpGain:0,done:false};render();}
function drillSubmit(choice){const s=ui.sess;const q=s.queue[s.idx];let ok;
  if(q.mode==="mcq")ok=choice===q.sol;else{const inp=$("#drillInput");const val=inp?inp.value:"";if(!val.trim())return;ok=checkAnswer(q,val);}
  const fast=(Date.now()-s.t0)/1000<15;const gain=ok?8*q.lvl+(fast?4:0):0;const queue=[...s.queue];
  if(!ok&&queue.length<13){const again={...GEN[q.dom](q.lvl),dom:q.dom,lvl:q.lvl,retry:true};queue.splice(Math.min(s.idx+3,queue.length),0,again);}
  ui.sess={...s,queue,fb:{ok,sol:q.disp},results:[...s.results,{dom:q.dom,ok}],xpGain:s.xpGain+gain};render();}
function drillNext(){const s=ui.sess;const ni=s.idx+1;
  if(ni>=s.queue.length){const d={...(S.skills.d||{})};const touched={};
    s.results.forEach(r=>{const cur=d[r.dom]||{lvl:1,hist:[]};cur.hist=[...(cur.hist||[]),r.ok].slice(-10);d[r.dom]=cur;touched[r.dom]=true;});
    const changes=[];Object.keys(touched).forEach(id=>{const cur=d[id];const n=cur.hist.length,w=cur.hist.filter(Boolean).length;
      if(n>=6&&w/n>=0.8&&cur.lvl<3){cur.lvl++;cur.hist=[];changes.push(DOMAINS.find(x=>x.id===id).name+" → niveau "+cur.lvl+" 🔺");}
      else if(n>=6&&w/n<=0.4&&cur.lvl>1){cur.lvl--;cur.hist=[];changes.push(DOMAINS.find(x=>x.id===id).name+" → niveau "+cur.lvl+" 🔻");}});
    S.skills={xp:(S.skills.xp||0)+s.xpGain,d};save();ui.sess={...s,done:true,changes};render();return;}
  ui.sess={...s,idx:ni,fb:null,t0:Date.now()};render();setTimeout(()=>{const i=$("#drillInput");if(i)i.focus();},50);}
function endDrill(){ui.sess=null;render();}

function gradeFlash(ok){const tk=todayKey();const c=ui.flashQueue[ui.flashIdx];const s=S.flash[c.id]||{box:1};const box=ok?Math.min(4,(s.box||1)+1):1;const dueNext=ok?addDays(tk,BOX_GAP[box-1]):tk;

function checklistPct(dk){const list=buildChecklist(dk);const ch=S.days[dk]||{};const n=list.filter(it=>ch[it.id]).length;return Math.round(n/list.length*100);}
function last14(){const tk=todayKey();const out=[];for(let i=13;i>=0;i--){const dk=addDays(tk,-i);out.push({dk,pct:dk<"2026-07-06"?null:checklistPct(dk)});}return out;}
function sleepOkOf(dk){const r=rampOf(dk),rc=S.sleep[dk]||{};if(!rc.bed&&!rc.wake)return null;
  const toMin=t=>{if(!t)return null;const[h,m]=t.split(":").map(Number);let v=h*60+m;if(v<12*60)v+=24*60;return v;};
  const toMinW=t=>{if(!t)return null;const[h,m]=t.split(":").map(Number);return h*60+m;};
  const ob=rc.bed&&Math.abs(toMin(rc.bed)-toMin(r.bed))<=30;const ow=rc.wake&&Math.abs(toMinW(rc.wake)-toMinW(r.wake))<=30;return !!(ob&&ow);}
function flashBoxes(){const b={0:0,1:0,2:0,3:0,4:0};FLASH.forEach(c=>{const s=S.flash[c.id];if(!s)b[0]++;else b[s.box||1]++;});return b;}
function kpi(cls,v,l,s){return '<div class="kpi '+cls+'"><div class="kv">'+v+'</div><div class="kl">'+l+'</div>'+(s?'<div class="ks">'+s+'</div>':"")+'</div>';}
function skillTreeHtml(){
  return '<div class="skilltree">'+DOMAINS.map(d=>{
    const sk=S.skills.d[d.id];const lvl=(sk&&sk.lvl)||1;
    const hist=(sk&&sk.hist)||[];const rate=hist.length?Math.round(hist.filter(Boolean).length/hist.length*100):null;
    const played=!!sk;
    const col=lvl>=3?"var(--gold)":lvl===2?"var(--orange)":"var(--cyan)";
    const pct=rate==null?(played?100:0):rate;
    return '<div class="skill'+(played?"":" locked")+'"><div class="ring" style="background:conic-gradient('+col+' '+pct+'%, rgba(255,255,255,.08) '+pct+'%)"><div class="rin"><span class="rlvl" style="color:'+col+'">'+lvl+'</span><span class="rpct">'+(rate==null?"—":rate+"%")+'</span></div></div><div class="sname">'+d.name+'</div></div>';
  }).join("")+'</div>';
}

function prepaSleep(){
  const tk=todayKey();const r=rampOf(tk);const rec=S.sleep[tk]||{};
  const toMin=t=>{if(!t)return null;const[h,m]=t.split(":").map(Number);let v=h*60+m;if(v<12*60)v+=24*60;return v;};
  const toMinW=t=>{if(!t)return null;const[h,m]=t.split(":").map(Number);return h*60+m;};
  const okBed=rec.bed&&Math.abs(toMin(rec.bed)-toMin(r.bed))<=30;const okWake=rec.wake&&Math.abs(toMinW(rec.wake)-toMinW(r.wake))<=30;
  const hist=[];for(let n=1;n<=10;n++){const dk=addDays(tk,-n);if(dk<"2026-07-06")break;const rr=rampOf(dk),rc=S.sleep[dk]||{};const ob=rc.bed&&Math.abs(toMin(rc.bed)-toMin(rr.bed))<=30;const ow=rc.wake&&Math.abs(toMinW(rc.wake)-toMinW(rr.wake))<=30;hist.push({dk,rc,ok:ob&&ow,logged:!!(rc.bed||rc.wake)});}
  return '<div class="p-card ink"><div class="p-card-title">Cible ce soir</div><div style="font-size:24px;font-weight:800;color:var(--bic)">'+r.bed+' <span style="font-size:13px;color:var(--pencil)">coucher</span> → '+r.wake+' <span style="font-size:13px;color:var(--pencil)">réveil</span></div><div class="pen p-red" style="font-size:19px;margin-top:2px">on avance de 30 min tous les 2-3 jours, pas de raccourci</div></div>'+
    '<div class="p-card"><div style="font-weight:700;font-size:14px;margin-bottom:8px">Enregistrer aujourd\'hui ('+esc(frDate(tk))+')</div><div class="p-grid2">'+
      '<label style="font-size:12px;font-weight:600;color:var(--pencil)">Couché hier à<input type="time" id="sleepBed" value="'+(rec.bed||"")+'" class="p-time'+(okBed?" ok":"")+'" style="margin-top:4px"></label>'+
      '<label style="font-size:12px;font-weight:600;color:var(--pencil)">Levé ce matin à<input type="time" id="sleepWake" value="'+(rec.wake||"")+'" class="p-time'+(okWake?" ok":"")+'" style="margin-top:4px"></label>'+
    '</div>'+((rec.bed||rec.wake)?'<div style="font-size:14px;font-weight:600;margin-top:10px;color:'+(okBed&&okWake?"var(--green)":"var(--penred)")+'">'+(okBed&&okWake?"✓ Dans la cible (±30 min). Monstre.":"Hors cible — on retente ce soir, réveil non négociable demain.")+'</div>':"")+'</div>'+
    '<div class="p-card"><div style="font-weight:700;font-size:14px;margin-bottom:6px">10 derniers jours</div>'+(hist.length===0?'<div class="p-sub">Rien encore — premier log ce soir.</div>':hist.map(h=>'<div class="p-row"><span class="p-pencil">'+esc(frDate(h.dk))+'</span><span class="p-flex" style="text-align:center;font-weight:600">'+(h.rc.bed||"—")+' → '+(h.rc.wake||"—")+'</span><span>'+(!h.logged?"·":h.ok?"✅":"❌")+'</span></div>').join(""))+'</div>'+
    '<div class="p-card"><div style="font-weight:700">Protocole</div><div style="font-size:14px;margin-top:4px;line-height:1.7">1. Réveil fixe 7 j/7, même après une mauvaise nuit.<br>2. Lumière + mouvement dans les 20 premières minutes.<br>3. Caféine : stop 14h.<br>4. Dernière heure : lumière basse, pas de scroll — la lecture philo tombe pile là.<br>5. Lit = sommeil. Pas de téléphone dedans.</div></div>';
}

  const off=$("#sbOff");if(off)off.addEventListener("click",async()=>{SB.url="";SB.key="";sync.cloud="off";await saveCreds();renderSettings();updateSyncChip();toast("Supabase déconnecté");});
}

/* =======================================================================
   FX
   ======================================================================= */
function renderLevelUp(){if(ui.levelupTo==null)return;const L=LEVELS[ui.levelupTo];const el=document.createElement("div");el.className="levelup";el.innerHTML='<div class="inner"><div class="lu-eyebrow">Level up</div><div class="lu-lvl">NIV. '+(ui.levelupTo+1)+'</div><div class="lu-title">'+esc(L.t)+'</div><div class="lu-tap">toucher pour continuer</div></div>';el.addEventListener("click",()=>{el.remove();ui.levelupTo=null;});document.body.appendChild(el);}
function confetti(n){const colors=["#ff3d8b","#ff8e3c","#ffd166","#35e0d0","#f6f2ff"];for(let i=0;i<n;i++){const c=document.createElement("div");c.className="confetti";c.style.left=Math.random()*100+"vw";c.style.background=colors[Math.floor(Math.random()*colors.length)];c.style.animationDuration=(1.6+Math.random()*1.6)+"s";c.style.animationDelay=(Math.random()*.4)+"s";document.body.appendChild(c);setTimeout(()=>c.remove(),3600);}}
let toastTimer=null;
function toast(msg){let t=$("#toast");if(!t){t=document.createElement("div");t.id="toast";t.className="toast";document.body.appendChild(t);}t.textContent=msg;requestAnimationFrame(()=>t.classList.add("show"));clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),2600);}

/* =======================================================================
   BINDINGS
   ======================================================================= */
function bindCommon(){
  document.querySelectorAll("[data-world]").forEach(b=>b.addEventListener("click",()=>{ui.world=b.dataset.world;if(ui.world==="prepa"&&!["today","drill","flash","sleep","plan"].includes(ui.tab))ui.tab="today";render();}));
  document.querySelectorAll("[data-goto]").forEach(b=>b.addEventListener("click",()=>{ui.world="prepa";ui.tab=b.dataset.goto;render();}));
  const chip=$("#syncChip");if(chip)chip.addEventListener("click",openSettings);
  const setB=$("#setBtn");if(setB)setB.addEventListener("click",openSettings);
  const rst=$("#resetBtn");if(rst)rst.addEventListener("click",()=>{if(confirm("Tout effacer : Cœur + Prépa ?")&&confirm("Sûr de sûr ? Irréversible."))wipe();});
}
function bindCoeur(){
  const add=$("#addBtn");if(add)add.addEventListener("click",()=>addQuest($("#qname").value,ui.selEmoji));
  const nm=$("#qname");if(nm)nm.addEventListener("keydown",e=>{if(e.key==="Enter")addQuest(nm.value,ui.selEmoji);});
  document.querySelectorAll("[data-emoji]").forEach(b=>b.addEventListener("click",()=>{ui.selEmoji=b.dataset.emoji;render();}));
  document.querySelectorAll("[data-log]").forEach(b=>b.addEventListener("click",()=>openModal(b.dataset.log)));
  document.querySelectorAll("[data-menu]").forEach(b=>b.addEventListener("click",ev=>{ev.stopPropagation();ui.menuFor=ui.menuFor===b.dataset.menu?null:b.dataset.menu;render();}));
  document.querySelectorAll("[data-close]").forEach(b=>b.addEventListener("click",()=>setStatus(b.dataset.close,"closed")));
  document.querySelectorAll("[data-reopen]").forEach(b=>b.addEventListener("click",()=>setStatus(b.dataset.reopen,"active")));
  document.querySelectorAll("[data-del]").forEach(b=>b.addEventListener("click",()=>removeQuest(b.dataset.del)));
  const irl=$("#irlBtn");if(irl)irl.addEventListener("click",()=>openModal(null));
}
function bindPrepa(){
  document.querySelectorAll("[data-tab]").forEach(b=>b.addEventListener("click",()=>{ui.tab=b.dataset.tab;if(b.dataset.tab==="flash")ui.flashReset=true;render();}));
  document.querySelectorAll("[data-day]").forEach(b=>b.addEventListener("click",()=>toggleDay(b.dataset.day)));
  document.querySelectorAll("[data-todo]").forEach(b=>b.addEventListener("click",()=>doTodo(b.dataset.todo)));
  // drill
  document.querySelectorAll("[data-drill]").forEach(b=>b.addEventListener("click",()=>startDrill(b.dataset.drill)));
  const ok=$("#drillOK");if(ok)ok.addEventListener("click",()=>drillSubmit());
  const di=$("#drillInput");if(di)di.addEventListener("keydown",e=>{if(e.key==="Enter")drillSubmit();});
  document.querySelectorAll("[data-choice]").forEach(b=>b.addEventListener("click",()=>{const q=ui.sess.queue[ui.sess.idx];drillSubmit(q.choices[Number(b.dataset.choice)]);}));
  const dn=$("#drillNext");if(dn)dn.addEventListener("click",drillNext);
  const da=$("#drillAgain");if(da)da.addEventListener("click",endDrill);
  // flash
  const fc=$("#flashCard");if(fc)fc.addEventListener("click",()=>{ui.flashRev=!ui.flashRev;render();});
  document.querySelectorAll("[data-grade]").forEach(b=>b.addEventListener("click",()=>gradeFlash(b.dataset.grade==="1")));
  const fm=$("#flashMore");if(fm)fm.addEventListener("click",()=>{ui.flashReset=true;render();});
  // sleep
  const sb=$("#sleepBed");if(sb)sb.addEventListener("change",()=>upSleep("bed",sb.value));
  const sw=$("#sleepWake");if(sw)sw.addEventListener("change",()=>upSleep("wake",sw.value));
}

// fermeture des menus quête au clic extérieur
document.body.addEventListener("click",ev=>{if(ui.menuFor&&!ev.target.closest(".qmenu")&&!ev.target.closest(".qmenu-btn")){ui.menuFor=null;render();}});

/* =======================================================================
   GO
   ======================================================================= */
(async function init(){await load();render();})();
</script>
</body>
